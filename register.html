<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar - Arya Store</title>
    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .bubbles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            top: 0;
            left: 0;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: rise 10s infinite ease-in;
        }

        .bubble:nth-child(1) {
            left: 10%;
            width: 80px;
            height: 80px;
            animation-duration: 8s;
        }
        .bubble:nth-child(2) {
            left: 20%;
            width: 20px;
            height: 20px;
            animation-duration: 5s;
            animation-delay: 1s;
        }
        .bubble:nth-child(3) {
            left: 40%;
            width: 50px;
            height: 50px;
            animation-duration: 7s;
            animation-delay: 2s;
        }
        .bubble:nth-child(4) {
            left: 70%;
            width: 60px;
            height: 60px;
            animation-duration: 9s;
            animation-delay: 0s;
        }
        .bubble:nth-child(5) {
            left: 90%;
            width: 30px;
            height: 30px;
            animation-duration: 6s;
            animation-delay: 3s;
        }

        @keyframes rise {
            0% {
                bottom: -100px;
                transform: translateX(0);
            }
            50% {
                transform: translateX(100px);
            }
            100% {
                bottom: 1080px;
                transform: translateX(-200px);
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo i {
            font-size: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo h1 {
            font-size: 24px;
            margin-top: 5px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-size: 22px;
            font-weight: 700;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group i:first-child {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
            transition: all 0.3s;
            z-index: 10;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 45px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 400;
            transition: all 0.3s;
            background: white;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            font-size: 18px;
            transition: color 0.3s;
            z-index: 10;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 400;
            transition: all 0.3s;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            font-weight: 300;
            color: #999;
        }

        .input-group:focus-within i:first-child {
            color: #667eea;
        }

        .password-section {
            margin-bottom: 20px;
        }

        .password-hint {
            font-size: 12px;
            font-weight: 400;
            color: #666;
            margin-top: 5px;
            margin-left: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .password-hint i {
            color: #667eea;
            font-size: 12px;
        }

        .strength-meter {
            height: 4px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-top: 8px;
            margin-bottom: 5px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
            border-radius: 10px;
        }

        .strength-bar.weak {
            width: 33.33%;
            background: #ef4444;
        }

        .strength-bar.medium {
            width: 66.66%;
            background: #f59e0b;
        }

        .strength-bar.strong {
            width: 100%;
            background: #22c55e;
        }

        .terms {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 20px 0 10px;
            font-size: 13px;
            font-weight: 400;
            color: #666;
        }

        .terms input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
            cursor: pointer;
        }

        .terms label {
            cursor: pointer;
        }

        .terms a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.7s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        button:hover:not(:disabled)::before {
            left: 100%;
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .link {
            text-align: center;
            margin-top: 20px;
        }

        .link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .link a:hover {
            color: #764ba2;
            gap: 12px;
        }

        .alert {
            background: linear-gradient(145deg, #fee, #ffd5d5);
            color: #c33;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            animation: shake 0.5s ease;
            border-left: 4px solid #c33;
            font-size: 14px;
            font-weight: 500;
        }

        .alert.warning {
            background: linear-gradient(145deg, #fff3cd, #ffeeba);
            color: #856404;
            border-left-color: #ffc107;
        }

        .alert.success {
            background: linear-gradient(145deg, #d4edda, #c3e6cb);
            color: #155724;
            border-left-color: #28a745;
        }

        /* MODAL OTP STYLES */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.4s ease;
            position: relative;
        }

        .modal-content h3 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #333;
            text-align: center;
        }

        .modal-content p {
            color: #666;
            margin-bottom: 25px;
            text-align: center;
            font-size: 14px;
        }

        .modal-input-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .modal-input-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 22px;
        }

        .modal-input {
            width: 100%;
            padding: 18px 18px 18px 55px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 500;
            text-align: center;
            letter-spacing: 8px;
            font-family: monospace;
        }

        .modal-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s;
        }

        .modal-btn-primary {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
        }

        .modal-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .modal-btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .modal-btn-secondary:hover {
            background: #e0e0e0;
        }

        .resend-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }

        .resend-link a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }

        .resend-link a:hover {
            text-decoration: underline;
        }

        .timer {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #f59e0b;
            font-weight: 500;
        }

        .modal-error {
            color: #c33;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h2 {
                font-size: 20px;
            }
            input, .input-wrapper input {
                padding: 14px 40px 14px 40px;
            }
            .modal-content {
                padding: 30px 24px;
            }
            .modal-input {
                font-size: 16px;
                letter-spacing: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="container">
        <div class="logo">
            <i class="fas fa-store"></i>
            <h1>Arya Store</h1>
        </div>
        
        <h2><i class="fas fa-user-plus" style="margin-right: 8px;"></i> Buat Akun Baru</h2>
        
        <div id="alert" class="alert">
            <i class="fas fa-exclamation-circle"></i> <span id="alertMessage"></span>
        </div>
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Username" autofocus>
        </div>
        
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Email">
        </div>
        
        <div class="input-group">
            <i class="fas fa-phone-alt"></i>
            <input type="tel" id="phone" placeholder="Nomor HP">
        </div>
        
        <div class="password-section">
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Password" onkeyup="checkPasswordStrength()" oninput="checkPasswordStrength()">
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>
            <div class="password-hint">
                <i class="fas fa-info-circle"></i> Minimal 6 karakter
            </div>
            <div class="strength-meter">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
        </div>
        
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <div class="input-wrapper">
                <input type="password" id="confirmPassword" placeholder="Konfirmasi Password">
                <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
            </div>
        </div>
        
        <div class="terms">
            <input type="checkbox" id="termsCheckbox">
            <label for="termsCheckbox">Dengan mendaftar, Anda menyetujui <a href="#">Syarat & Ketentuan</a></label>
        </div>
        
        <button onclick="register()" id="registerBtn">
            <span>Daftar Sekarang</span>
            <i class="fas fa-arrow-right"></i>
        </button>
        
        <div class="link">
            <a href="/login"><i class="fas fa-sign-in-alt"></i> Sudah punya akun? Login</a>
        </div>
    </div>

    <!-- MODAL OTP VERIFICATION -->
    <div id="otpModal" class="modal-overlay">
        <div class="modal-content">
            <h3>📧 Verifikasi Email</h3>
            <p>Kode verifikasi telah dikirim ke <strong id="otpEmailDisplay"></strong></p>
            
            <div class="modal-input-wrapper">
                <i class="fas fa-key"></i>
                <input type="text" id="otpCode" class="modal-input" placeholder="000000" maxlength="6" autocomplete="off">
            </div>
            
            <div id="otpError" class="modal-error">
                <i class="fas fa-exclamation-circle"></i> <span id="otpErrorMessage"></span>
            </div>
            
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="closeOtpModal()">Batal</button>
                <button class="modal-btn modal-btn-primary" onclick="verifyEmailOtp()" id="verifyOtpBtn">
                    Verifikasi
                </button>
            </div>
            
            <div class="resend-link">
                <a onclick="resendVerificationOtp()" id="resendOtpLink">Kirim ulang kode?</a>
            </div>
            <div class="timer" id="otpTimer"></div>
        </div>
    </div>

    <script>
        // Toggle Password Visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
        
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        
        toggleConfirmPassword.addEventListener('click', function() {
            const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
        
        document.getElementById('username').focus();

        // Variables for OTP
        let currentRegisterEmail = '';
        let otpTimerInterval = null;

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('strengthBar');
            
            if (!password) {
                strengthBar.className = 'strength-bar';
                strengthBar.style.width = '0';
                return;
            }
            
            let strength = 0;
            
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            strengthBar.className = 'strength-bar';
            strengthBar.style.width = '0';
            
            if (strength <= 2) {
                strengthBar.classList.add('weak');
                strengthBar.style.width = '33.33%';
            } else if (strength <= 4) {
                strengthBar.classList.add('medium');
                strengthBar.style.width = '66.66%';
            } else {
                strengthBar.classList.add('strong');
                strengthBar.style.width = '100%';
            }
        }

        async function register() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const termsChecked = document.getElementById('termsCheckbox').checked;
            
            if (!username) {
                showAlert('Username wajib diisi!');
                return;
            }
            
            if (username.length < 3) {
                showAlert('Username minimal 3 karakter!');
                return;
            }
            
            if (!password) {
                showAlert('Password wajib diisi!');
                return;
            }
            
            if (password.length < 6) {
                showAlert('Password minimal 6 karakter!');
                return;
            }
            
            if (password !== confirm) {
                showAlert('Password tidak cocok!');
                return;
            }
            
            if (!email && !phone) {
                showAlert('Email atau Nomor HP harus diisi!');
                return;
            }
            
            if (email && !email.includes('@')) {
                showAlert('Format email tidak valid!');
                return;
            }
            
            if (phone && !/^[0-9+\-\s]+$/.test(phone)) {
                showAlert('Format nomor HP tidak valid!');
                return;
            }
            
            if (!termsChecked) {
                showAlert('Anda harus menyetujui Syarat & Ketentuan');
                return;
            }
            
            const btn = document.getElementById('registerBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mendaftar...';
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, phone, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    currentRegisterEmail = email;
                    showAlert('Registrasi berhasil! Silakan verifikasi email Anda.', 'success');
                    
                    // Kirim OTP verifikasi
                    await sendVerificationOtp(email);
                    
                    // Reset form
                    document.getElementById('username').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('phone').value = '';
                    document.getElementById('password').value = '';
                    document.getElementById('confirmPassword').value = '';
                    document.getElementById('termsCheckbox').checked = false;
                    document.getElementById('strengthBar').className = 'strength-bar';
                    document.getElementById('strengthBar').style.width = '0';
                    
                    // Tampilkan modal OTP
                    document.getElementById('otpEmailDisplay').innerText = email;
                    document.getElementById('otpModal').style.display = 'flex';
                    document.getElementById('otpCode').value = '';
                    document.getElementById('otpError').style.display = 'none';
                    startOtpTimer(600);
                } else {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    showAlert(data.error || 'Registrasi gagal');
                }
            } catch (error) {
                btn.innerHTML = originalText;
                btn.disabled = false;
                showAlert('Terjadi kesalahan. Silakan coba lagi.');
            }
        }
        
        async function sendVerificationOtp(email) {
            try {
                const res = await fetch('/api/send-verification-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (data.success) {
                    console.log('OTP terkirim ke:', email);
                }
            } catch (error) {
                console.error('Gagal kirim OTP:', error);
            }
        }

        async function verifyEmailOtp() {
            const otp = document.getElementById('otpCode').value;
            
            if (!otp || otp.length !== 6) {
                document.getElementById('otpErrorMessage').innerText = 'Masukkan kode OTP 6 digit!';
                document.getElementById('otpError').style.display = 'block';
                return;
            }
            
            const btn = document.getElementById('verifyOtpBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memverifikasi...';
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/verify-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentRegisterEmail, otp })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    closeOtpModal();
                    showAlert('Email berhasil diverifikasi! Silakan login.', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    document.getElementById('otpErrorMessage').innerText = data.message;
                    document.getElementById('otpError').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('otpErrorMessage').innerText = 'Gagal verifikasi. Coba lagi.';
                document.getElementById('otpError').style.display = 'block';
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function resendVerificationOtp() {
            await sendVerificationOtp(currentRegisterEmail);
            startOtpTimer(600);
            showAlert('Kode OTP baru telah dikirim!', 'success');
        }

        function startOtpTimer(seconds) {
            if (otpTimerInterval) clearInterval(otpTimerInterval);
            
            const timerElement = document.getElementById('otpTimer');
            const resendLink = document.getElementById('resendOtpLink');
            
            let remaining = seconds;
            
            otpTimerInterval = setInterval(() => {
                if (remaining <= 0) {
                    clearInterval(otpTimerInterval);
                    timerElement.innerHTML = '⏰ Kode sudah kadaluarsa. Kirim ulang!';
                    timerElement.style.color = '#dc3545';
                    resendLink.style.pointerEvents = 'auto';
                    resendLink.style.opacity = '1';
                } else {
                    const minutes = Math.floor(remaining / 60);
                    const secs = remaining % 60;
                    timerElement.innerHTML = `⏱️ Kode berlaku selama ${minutes}:${secs.toString().padStart(2, '0')}`;
                    timerElement.style.color = '#f59e0b';
                    resendLink.style.pointerEvents = 'none';
                    resendLink.style.opacity = '0.5';
                    remaining--;
                }
            }, 1000);
        }

        function closeOtpModal() {
            document.getElementById('otpModal').style.display = 'none';
            if (otpTimerInterval) clearInterval(otpTimerInterval);
        }
        
        function showAlert(msg, type = 'error') {
            const alert = document.getElementById('alert');
            const alertMsg = document.getElementById('alertMessage');
            
            alertMsg.innerText = msg;
            alert.className = 'alert';
            
            if (type === 'warning') {
                alert.classList.add('warning');
            } else if (type === 'success') {
                alert.classList.add('success');
            }
            
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
                alert.classList.remove('warning', 'success');
            }, 5000);
        }
        
        document.getElementById('confirmPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                register();
            }
        });
        
        document.getElementById('otpCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyEmailOtp();
        });
        
        document.getElementById('otpCode').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
        });
        
        window.onclick = function(event) {
            const otpModal = document.getElementById('otpModal');
            if (event.target === otpModal) closeOtpModal();
        }
    </script>
</body>
</html>
